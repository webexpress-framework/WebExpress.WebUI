name: Generate and Deploy Preview Documentation

on:
  push:
    branches:
      - develop

permissions:
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.x

    - name: Install DocFX
      run: dotnet tool install -g docfx

    - name: Add DocFX to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      
    - name: Clone WebExpress.WebCore
      run: |
        git clone https://github.com/webexpress-framework/WebExpress.WebCore.git
        mkdir -p packages

    - name: Build local NuGet package
      run: |
        dotnet pack WebExpress.WebCore/src/WebExpress.WebCore/WebExpress.WebCore.csproj -c Release -o packages

    - name: Create nuget.config
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>' > nuget.config
        echo '<configuration>' >> nuget.config
        echo '  <packageSources>' >> nuget.config
        echo '    <add key="LocalPackages" value="packages" />' >> nuget.config
        echo '    <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />' >> nuget.config
        echo '  </packageSources>' >> nuget.config
        echo '</configuration>' >> nuget.config

    - name: Restore packages with local feed
      run: dotnet restore --configfile nuget.config

    - name: Generate documentation
      run: |
        cd docs 
        docfx metadata
        docfx build -o _site/preview --globalMetadata "_isPreview=true"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
